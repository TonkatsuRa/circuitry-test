<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CIRCUIT::GRID // SYS_LINK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />

  <!-- Preload Three.js so the network fetch starts immediately while the
       rest of the page parses. The shim in js/lib/three.js re-exports from
       this same URL. -->
  <link
    rel="modulepreload"
    href="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    crossorigin="anonymous"
  />
</head>
<body>
  <!-- 3D canvas mount point -->
  <div id="scene-root"></div>

  <!-- HUD overlay (decorative cyberpunk frame) -->
  <div class="hud">
    <div class="hud-corner hud-tl">
      <span class="hud-tag">SYS::CIRCUIT_GRID</span>
      <span class="hud-sub">v2.4.7 // LINK_ACTIVE</span>
    </div>
    <div class="hud-corner hud-tr">
      <span class="hud-tag" id="hud-clock">--:--:--</span>
      <span class="hud-sub">UTC.SYNC</span>
    </div>
    <div class="hud-corner hud-bl">
      <span class="hud-tag">NODE::CORE_0x01</span>
      <span class="hud-sub">TAP A MODULE TO PROBE</span>
    </div>
    <div class="hud-corner hud-br">
      <span class="hud-tag" id="hud-status">IDLE</span>
      <span class="hud-sub">DIAGNOSTIC.MODE</span>
    </div>
  </div>

  <!-- Scanline + grain overlay -->
  <div class="scanlines"></div>
  <div class="vignette"></div>

  <!-- Popup modal -->
  <div class="popup-backdrop" id="popup-backdrop" aria-hidden="true">
    <div class="popup" role="dialog" aria-modal="true" aria-labelledby="popup-title">
      <div class="popup-frame-corner tl"></div>
      <div class="popup-frame-corner tr"></div>
      <div class="popup-frame-corner bl"></div>
      <div class="popup-frame-corner br"></div>

      <header class="popup-header">
        <div class="popup-id" id="popup-id">--</div>
        <button class="popup-close" id="popup-close" aria-label="Close">×</button>
      </header>

      <h2 class="popup-title" id="popup-title">--</h2>
      <div class="popup-subtitle" id="popup-subtitle">--</div>

      <div class="popup-body" id="popup-body">
        <!-- Populated dynamically -->
      </div>

      <footer class="popup-footer">
        <span class="popup-status" id="popup-status">● LINK ESTABLISHED</span>
        <span class="popup-hint">[ESC] DISCONNECT</span>
      </footer>
    </div>
  </div>

  <!-- Loading screen -->
  <div class="boot" id="boot">
    <div class="boot-text" id="boot-text">
      <span class="boot-line">> INITIALIZING CIRCUIT_GRID...</span>
      <span class="boot-line">> LOADING GEOMETRY BUFFERS...</span>
      <span class="boot-line">> CALIBRATING TRACE NETWORK...</span>
      <span class="boot-line boot-line-final">> SYSTEM READY_</span>
    </div>
  </div>

  <!--
    PRE-FLIGHT CHECK — classic script that runs even when ES modules can't.
    Detects file:// usage (modules are blocked there by browser security)
    and surfaces any uncaught script errors as a clear message on the boot
    screen, so failures don't appear as a stuck "SYSTEM READY_".
  -->
  <script>
    (function () {
      function showFatal(title, lines) {
        var boot = document.getElementById('boot');
        if (!boot) return;
        boot.classList.add('boot-error');
        var html =
          '<div class="boot-text">' +
            '<span class="boot-line boot-err">> ' + title + '</span>';
        for (var i = 0; i < lines.length; i++) {
          html += '<span class="boot-line">> ' + lines[i] + '</span>';
        }
        html += '</div>';
        boot.innerHTML = html;
      }

      // ES modules cannot load from file:// in any modern browser.
      if (location.protocol === 'file:') {
        document.addEventListener('DOMContentLoaded', function () {
          showFatal('FILE:// PROTOCOL DETECTED', [
            'ES MODULES ARE BLOCKED FROM LOCAL FILES.',
            '',
            'RUN A LOCAL SERVER:',
            '  python3 -m http.server 8000',
            '  npx serve .',
            '',
            'THEN OPEN http://localhost:8000',
            '',
            'OR DEPLOY TO GITHUB PAGES.',
          ]);
        });
        return; // skip the watchdog below
      }

      // Surface any uncaught script errors on the boot screen so failures
      // are visible without needing devtools open.
      window.addEventListener('error', function (e) {
        if (document.getElementById('boot')?.classList.contains('fade')) return;
        showFatal('RUNTIME ERROR', [
          (e.message || 'Unknown error').toUpperCase(),
          e.filename ? 'IN: ' + e.filename.split('/').pop() : '',
          'CHECK BROWSER CONSOLE FOR DETAILS.',
        ].filter(Boolean));
      });

      window.addEventListener('unhandledrejection', function (e) {
        if (document.getElementById('boot')?.classList.contains('fade')) return;
        showFatal('PROMISE REJECTION', [
          String(e.reason && e.reason.message || e.reason || 'unknown').toUpperCase(),
          'CHECK BROWSER CONSOLE FOR DETAILS.',
        ]);
      });

      // Watchdog — if main.js hasn't signalled it's running after 10s,
      // something went wrong (module load failure, CDN issue, etc).
      window.__circuitBooted = false;
      setTimeout(function () {
        if (window.__circuitBooted) return;
        if (!document.getElementById('boot')) return;
        showFatal('STARTUP TIMEOUT', [
          'MAIN MODULE FAILED TO LOAD.',
          '',
          'LIKELY CAUSES:',
          '  • THREE.JS CDN UNREACHABLE',
          '  • NETWORK BLOCKED',
          '  • ES MODULES NOT SUPPORTED',
          '',
          'OPEN DEVTOOLS CONSOLE FOR DETAILS.',
        ]);
      }, 10000);
    })();
  </script>

  <script type="module" src="js/main.js"></script>
</body>
</html>
